# This tmux statusbar config was created by tmuxline.vim
# on Fr, 01 Jan 2021

set -g status-justify "left"
set -g status "on"
set -g status-left-style "none"
set -g message-command-style "fg=#D9D9D9,bg=#545454"
set -g status-right-style "none"
set -g pane-active-border-style "fg=#636363"
set -g status-style "none,bg=#424242"
set -g message-style "fg=#D9D9D9,bg=#545454"
set -g pane-border-style "fg=#545454"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none,fg=#636363,bg=#424242"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#909090,bg=#424242"
set -g status-left "#[fg=#C6C6C6,bg=#636363,bold] #S #[fg=#636363,bg=#424242,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#424242,bg=#424242,nobold,nounderscore,noitalics]#[fg=#909090,bg=#424242] %a #[fg=#545454,bg=#424242,nobold,nounderscore,noitalics]#[fg=#D9D9D9,bg=#545454] %Y-%m-%d | %H:%M #[fg=#636363,bg=#545454,nobold,nounderscore,noitalics]#[fg=#C6C6C6,bg=#636363] #h "
setw -g window-status-format "#[fg=#424242,bg=#424242,nobold,nounderscore,noitalics]#[default] #I | #W #[fg=#424242,bg=#424242,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#424242,bg=#545454,nobold,nounderscore,noitalics]#[fg=#D9D9D9,bg=#545454] #I | #{?window_zoomed_flag,(,} #W #{?window_zoomed_flag,),} #[fg=#545454,bg=#424242,nobold,nounderscore,noitalics]"
